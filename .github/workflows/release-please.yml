name: Release Versioning

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: node
          # This automatically parses conventional commits (feat: / fix: / etc)
          # Updates CHANGELOG.md, bumps package.json, and pushes GitHub tags!
