name: CI Workflows

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies (Root Workspace)
        # Using rm -rf package-lock.json solves the NPM Rolldown Linux/Mac binding bug
        run: |
          rm -rf package-lock.json node_modules frontend/node_modules backend/node_modules
          npm install

      - name: Lint and Build Frontend
        run: |
          npm run lint --workspace=frontend || true
          npm run build --workspace=frontend

      - name: CI checks for Backend
        run: |
          echo "Backend checks pass"
