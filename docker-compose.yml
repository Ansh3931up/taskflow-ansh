# Stack runs with defaults below (no `.env` required). Optional: create `.env` from `.env.example`
# to override credentials or secrets for local or production-like setups.
#
# Postgres stores the password inside the data volume at first init only. If you ever change
# DB_USER/DB_PASSWORD defaults, bump the volume name below so clones get a fresh DB (or run
# `docker compose down -v` once to remove the old volume).
name: taskflow-ansh

services:
  db:
    image: postgres:15-alpine
    container_name: taskflow-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-taskflow}
    ports:
      - '5432:5432'
    volumes:
      # Named volume key `pgdata` → fresh data dir vs older `postgres_data` volumes (password mismatch fix).
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER"']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflow-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-taskflow}?sslmode=disable
      PORT: ${PORT:-4000}
      NODE_ENV: ${NODE_ENV:-development}
      JWT_SECRET: ${JWT_SECRET:-development-only-change-for-production-min-10-chars}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}
    ports:
      - '4000:4000'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    container_name: taskflow-frontend
    ports:
      - '3000:80'
    depends_on:
      - backend

volumes:
  pgdata:
